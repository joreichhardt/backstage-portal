app:
  baseUrl: https://${APP_DOMAIN}

backend:
  baseUrl: https://${APP_DOMAIN}
  listen: ':7007'

  auth:
    keys:
      - secret: ${BACKEND_SECRET}

  cors:
    origin: https://${APP_DOMAIN}
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true

  database:
    client: pg
    connection:
      host: ${POSTGRES_HOST}
      port: ${POSTGRES_PORT}
      user: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}
      # SSL via PGSSLMODE env var (e.g. PGSSLMODE=require)
      # ssl:
      #   ca:
      #     $file: <path>/ca/server.crt

auth:
  providers:
    github:
      production:
        clientId: ${GITHUB_CLIENT_ID}
        clientSecret: ${GITHUB_CLIENT_SECRET}

techdocs:
  builder: external
  publisher:
    type: googleGcs
    googleGcs:
      bucketName: ${TECHDOCS_GCS_BUCKET_NAME}

permission:
  enabled: true

catalog:
  locations:
    # Organizational data
    - type: file
      target: ./examples/org.yaml
      rules:
        - allow: [User, Group]

    # Example entities
    - type: file
      target: ./examples/entities.yaml

    # GCP Infrastructure Templates
    - type: file
      target: ./examples/template/gcp-bucket.yaml
      rules:
        - allow: [Template]
    - type: file
      target: ./examples/template/gcp-gke.yaml
      rules:
        - allow: [Template]
    - type: file
      target: ./examples/template/gcp-compute.yaml
      rules:
        - allow: [Template]
    - type: file
      target: ./examples/template/gcp-cloud-sql.yaml
      rules:
        - allow: [Template]
    - type: file
      target: ./examples/template/gcp-vpc-peering.yaml
      rules:
        - allow: [Template]
    - type: file
      target: ./examples/template/gcp-dns.yaml
      rules:
        - allow: [Template]
    - type: file
      target: ./examples/template/gcp-api-gateway.yaml
      rules:
        - allow: [Template]
    - type: file
      target: ./examples/template/gcp-iam-role.yaml
      rules:
        - allow: [Template]
    - type: file
      target: ./examples/template/gcp-secret.yaml
      rules:
        - allow: [Template]
    - type: file
      target: ./examples/template/gcp-cert-manager.yaml
      rules:
        - allow: [Template]
    - type: file
      target: ./examples/template/gcp-domain-registration.yaml
      rules:
        - allow: [Template]
    - type: file
      target: ./examples/template/gcp-project-setup.yaml
      rules:
        - allow: [Template]
    - type: file
      target: ./examples/template/template.yaml
      rules:
        - allow: [Template]
